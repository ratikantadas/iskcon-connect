<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISKCON Connect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<script type="module" src="js/script.js"></script>

<body>

<div class="background-overlay"></div>

<div class="container">

<div class="card">

<div class="logo-section">

<img src="assets/logo.jpg" class="logo">

<h1>ISKCON Navi Mumbai</h1>

<p class="subtitle">

Hare Krishna 🙏

</p>

</div>

<div class="progress-container">

<div class="progress-bar">

<div id="progress"></div>

</div>

<div class="progress-text">

Step <span id="stepNumber">1</span> of 6

</div>

</div>

<form id="visitorForm">

<!-- STEP 1 -->

<div class="step active">

<h2>Your Name</h2>

<input
type="text"
id="name"
placeholder="Enter your full name"
required>

</div>

<!-- STEP 2 -->

<div class="step">

<h2>WhatsApp Number</h2>

<input
type="tel"
id="mobile"
maxlength="10"
placeholder="10 Digit Mobile Number"
required>

</div>

<!-- STEP 3 -->

<div class="step">

<h2>Gender</h2>

<div class="radio-grid">

<label>

<input type="radio" name="gender" value="Male">

Male

</label>

<label>

<input type="radio" name="gender" value="Female">

Female

</label>

</div>

</div>

<!-- STEP 4 -->

<div class="step">

<h2>Occupation</h2>

<select id="occupation">

<option value="">Select</option>

<option>Student</option>

<option>Job</option>

<option>Business</option>

<option>Homemaker</option>

<option>Retired</option>

<option>Other</option>

</select>

</div>

<!-- STEP 5 -->

<div class="step">

<h2>Where do you stay?</h2>

<select id="place">

<option value="">Select</option>

<option>Kharghar</option>

<option>Kamothe</option>

<option>Panvel</option>

<option>Belapur</option>

<option>Nerul</option>

<option>Vashi</option>

<option>Diva</option>

<option>Other</option>

</select>

<input

type="text"

id="otherPlace"

placeholder="Mention Place"

style="display:none; margin-top:15px;">

</div>

<!-- STEP 6 -->

<div class="step">

<h2>Spiritual Commitment</h2>

<div class="question">

<p>

Interested in FREE 5 Session Bhagavad Gita Course?

</p>

<label>

<input

type="radio"

name="gita"

value="Yes">

Yes

</label>

<label>

<input

type="radio"

name="gita"

value="No">

No

</label>

</div>

<br>

<div class="question">

<p>

Will you chant one round daily?

</p>

<label>

<input

type="radio"

name="chant"

value="Yes">

Yes

</label>

<label>

<input

type="radio"

name="chant"

value="Try">

I'll Try

</label>

<label>

<input

type="radio"

name="chant"

value="No">

Not Now

</label>

</div>

</div>

<div class="buttons">

<button

type="button"

id="prevBtn">

Previous

</button>

<button

type="button"

id="nextBtn">

Next

</button>

<button

type="submit"

id="submitBtn"

style="display:none;">

Register

</button>

</div>

</form>

</div>

</div>

</body>

</html>
